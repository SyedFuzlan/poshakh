<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Poshakh — Owner Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--maroon:#3D0D16;--gold:#C8A367;--cream:#F5EFE6;--charcoal:#1A1A1A;--bg:#f7f4f0;--cream-warm:#fdf8f3;--border-subtle:#e5e7eb;--error:#c00}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--charcoal)}
  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--maroon)}
  .login-box{background:#fff;padding:48px 40px;width:360px;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-box h1{font-size:22px;letter-spacing:4px;text-align:center;color:var(--maroon);margin-bottom:8px}
  .login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:32px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;margin-bottom:6px}
  .field input{width:100%;height:44px;border:1px solid #ddd;padding:0 12px;font-size:14px;border-radius:4px;outline:none;transition:border .2s}
  .field input:focus{border-color:var(--maroon)}
  .btn-login{width:100%;height:48px;background:var(--maroon);color:var(--gold);border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:4px;margin-top:8px}
  .error-msg{color:#c00;font-size:13px;text-align:center;margin-top:12px;display:none}
  /* APP */
  #app{display:none;min-height:100vh}
  header{background:var(--maroon);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
  header .logo{color:var(--gold);font-size:18px;letter-spacing:4px;font-weight:700}
  header .owner-info{color:rgba(255,255,255,.7);font-size:13px;display:flex;align-items:center;gap:16px}
  .btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 16px;cursor:pointer;font-size:12px;border-radius:4px;letter-spacing:1px}
  /* Stats bar */
  .stats-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:20px 32px;display:flex;gap:32px}
  .stat{display:flex;flex-direction:column;gap:4px}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
  .stat-value{font-size:22px;font-weight:700;color:var(--maroon)}
  /* Tabs */
  .tabs{display:flex;border-bottom:2px solid #e5e7eb;background:#fff;padding:0 32px}
  .tab{padding:16px 24px;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab.active{color:var(--maroon);border-bottom-color:var(--maroon)}
  .tab-content{display:none;padding:32px}
  .tab-content.active{display:block}
  /* Orders */
  .orders-filter{display:flex;gap:12px;margin-bottom:24px}
  .filter-btn{padding:8px 20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;letter-spacing:1px;border-radius:4px;transition:all .2s}
  .filter-btn.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .order-card{background:#fff;border-radius:8px;padding:24px;margin-bottom:16px;border:1px solid #e5e7eb;transition:box-shadow .2s}
  .order-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
  .order-id{font-size:12px;font-weight:700;letter-spacing:1px;color:#888}
  .order-date{font-size:12px;color:#888}
  .status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .status-paid{background:#dcfce7;color:#166534}
  .status-shipped{background:#dbeafe;color:#1e40af}
  .status-pending_verification{background:#fef9c3;color:#854d0e}
  .order-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
  .order-section h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:8px}
  .order-section p{font-size:14px;color:var(--charcoal);line-height:1.6}
  .items-list{display:flex;flex-direction:column;gap:8px}
  .item-row{display:flex;align-items:center;gap:12px}
  .item-img{width:48px;height:60px;object-fit:cover;border-radius:4px;border:1px solid #e5e7eb;background:#f9f9f9}
  .item-img-placeholder{width:48px;height:60px;background:#f0ece6;border-radius:4px;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:20px}
  .item-info{flex:1}
  .item-name{font-size:13px;font-weight:600;color:var(--charcoal)}
  .item-meta{font-size:12px;color:#888}
  .order-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;padding-top:16px}
  .order-total{font-size:18px;font-weight:700;color:var(--maroon)}
  .btn-ship{background:var(--maroon);color:var(--gold);border:none;padding:10px 24px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;transition:opacity .2s}
  .btn-ship:hover{opacity:.85}
  .btn-ship:disabled{opacity:.4;cursor:not-allowed}
  .shipped-label{color:#1e40af;font-size:12px;font-weight:700;letter-spacing:1px}
  /* Products */
  .product-form{background:#fff;border-radius:8px;padding:32px;margin-bottom:32px;border:1px solid #e5e7eb}
  .product-form h2{font-size:16px;font-weight:700;margin-bottom:24px;color:var(--maroon);letter-spacing:1px;text-transform:uppercase}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-grid .full{grid-column:1/-1}
  .pf-label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;margin-bottom:6px}
  .pf-input{width:100%;height:44px;border:1px solid #ddd;padding:0 12px;font-size:14px;border-radius:4px;outline:none;transition:border .2s}
  .pf-input:focus{border-color:var(--maroon)}
  .drop-zone{border:2px dashed #ddd;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
  .drop-zone:hover,.drop-zone.dragover{border-color:var(--maroon);background:#fdf8f3}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-zone p{color:#888;font-size:13px;margin-top:8px}
  .preview-img{width:80px;height:100px;object-fit:cover;border-radius:4px;margin:0 auto 8px;display:block}
  .btn-save{background:var(--maroon);color:var(--gold);border:none;padding:14px 32px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:4px;margin-top:16px}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
  .product-tile{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
  .product-tile img{width:100%;height:200px;object-fit:cover;display:block;background:#f0ece6}
  .product-tile .tile-body{padding:16px}
  .tile-name{font-size:14px;font-weight:600;color:var(--charcoal);margin-bottom:4px}
  .tile-meta{font-size:12px;color:#888;margin-bottom:12px}
  .tile-price{font-size:16px;font-weight:700;color:var(--maroon);margin-bottom:12px}
  .btn-delete{background:none;border:1px solid #fca5a5;color:#dc2626;padding:6px 16px;cursor:pointer;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-radius:4px;width:100%;transition:all .2s}
  .btn-delete:hover{background:#fef2f2}
  .empty-state{text-align:center;padding:60px 20px;color:#888;font-size:14px}
  .loading{text-align:center;padding:40px;color:#888}
  @media(max-width:768px){
    .order-body{grid-template-columns:1fr}
    .form-grid{grid-template-columns:1fr}
    .stats-bar{flex-wrap:wrap;gap:20px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>POSHAKH</h1>
    <p>Owner Dashboard</p>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="admin@poshakh.in"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••"/></div>
    <button class="btn-login" onclick="login()">SIGN IN</button>
    <p class="error-msg" id="login-error">Invalid credentials. Please try again.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">POSHAKH</div>
    <div class="owner-info">
      <span id="owner-email-display"></span>
      <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-label">Orders Today</span><span class="stat-value" id="stat-today-orders">—</span></div>
    <div class="stat"><span class="stat-label">Revenue Today</span><span class="stat-value" id="stat-today-revenue">—</span></div>
    <div class="stat"><span class="stat-label">Awaiting Shipment</span><span class="stat-value" id="stat-pending">—</span></div>
    <div class="stat"><span class="stat-label">Total Orders</span><span class="stat-value" id="stat-total">—</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders')">📦 Orders</div>
    <div class="tab" onclick="switchTab('products')">🛍️ Products</div>
  </div>

  <!-- ORDERS TAB -->
  <div id="tab-orders" class="tab-content active">
    <div class="orders-filter">
      <button class="filter-btn active" onclick="filterOrders('all',this)">All</button>
      <button class="filter-btn" onclick="filterOrders('paid',this)">To Ship</button>
      <button class="filter-btn" onclick="filterOrders('shipped',this)">Shipped</button>
      <button class="filter-btn" onclick="filterOrders('pending_verification',this)">UPI Pending</button>
    </div>
    <div id="orders-list"><div class="loading">Loading orders...</div></div>
  </div>

  <!-- PRODUCTS TAB -->
  <div id="tab-products" class="tab-content">
    <div class="product-form">
      <h2>Add New Product</h2>
      <div class="form-grid">
        <div class="full">
          <label class="pf-label">Product Image</label>
          <div class="drop-zone" id="drop-zone" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)">
            <input type="file" id="product-image" accept="image/*" onchange="previewImage(this)"/>
            <img id="img-preview" class="preview-img" style="display:none"/>
            <p id="drop-text">📸 Drag & drop image here, or click to browse</p>
          </div>
        </div>
        <div>
          <label class="pf-label">Product Name</label>
          <input class="pf-input" id="p-name" type="text" placeholder="e.g. Maroon Banarasi Saree"/>
        </div>
        <div>
          <label class="pf-label">Price (₹ INR)</label>
          <input class="pf-input" id="p-price" type="number" min="1" placeholder="e.g. 5999"/>
        </div>
        <div>
          <label class="pf-label">Category</label>
          <select class="pf-input" id="p-category">
            <option value="">Select category</option>
            <option value="sarees">Sarees</option>
            <option value="salwar">Salwar Kameez</option>
            <option value="lehenga">Lehengas</option>
            <option value="gowns">Gowns</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="pf-label">Collection (optional)</label>
          <input class="pf-input" id="p-collection" type="text" placeholder="e.g. Wedding Collection"/>
        </div>

        <!-- Phase 01: description textarea -->
        <div class="full">
          <label class="pf-label" for="p-description">Description (optional)</label>
          <textarea
            class="pf-input"
            id="p-description"
            rows="4"
            placeholder="Describe the product — fabric, occasion, care instructions..."
            style="height:auto;resize:vertical;padding:8px 12px;line-height:1.5"
          ></textarea>
        </div>

        <!-- Phase 01: sizes & stock -->
        <div class="full">
          <label class="pf-label">Sizes &amp; Stock <span style="color:var(--error)">*</span></label>
          <div id="sizes-container" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px">
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-XS" name="sizes[]" value="XS" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-XS" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">XS</label>
              <input type="number" id="stock-XS" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-S" name="sizes[]" value="S" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-S" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">S</label>
              <input type="number" id="stock-S" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-M" name="sizes[]" value="M" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-M" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">M</label>
              <input type="number" id="stock-M" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-L" name="sizes[]" value="L" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-L" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">L</label>
              <input type="number" id="stock-L" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-XL" name="sizes[]" value="XL" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-XL" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">XL</label>
              <input type="number" id="stock-XL" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-XXL" name="sizes[]" value="XXL" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-XXL" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">XXL</label>
              <input type="number" id="stock-XXL" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
            <div class="size-row" style="display:flex;align-items:center;gap:8px;background:#f7f4f0;border:1px solid var(--border-subtle);border-radius:4px;padding:8px 12px">
              <input type="checkbox" id="size-Free Size" name="sizes[]" value="Free Size" onchange="toggleStock(this)" style="width:16px;height:16px;accent-color:var(--maroon);cursor:pointer"/>
              <label for="size-Free Size" style="font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:36px">Free Size</label>
              <input type="number" id="stock-Free Size" name="stock[]" min="0" value="0" placeholder="qty" style="display:none;width:72px;height:32px;border:1px solid #ddd;border-radius:4px;padding:0 8px;font-size:12px;text-align:center"/>
            </div>
          </div>
          <p id="sizes-error" style="color:var(--error);font-size:12px;margin-top:8px;display:none">Select at least one size.</p>
        </div>
      </div>
      <button class="btn-save" onclick="saveProduct()">SAVE PRODUCT</button>
    </div>

    <div id="products-grid"><div class="loading">Loading products...</div></div>
  </div>
</div>

<script>
const API = '';  // same origin
let token = localStorage.getItem('poshakh_owner_token') || '';
let allOrders = [];
let currentFilter = 'all';

// ── Init ──────────────────────────────────────────────
window.onload = async () => {
  if (token) {
    try {
      const r = await apiFetch('/api/auth/verify', 'POST');
      if (r.valid) { showApp(r.email); return; }
    } catch {}
    token = '';
    localStorage.removeItem('poshakh_owner_token');
  }
  document.getElementById('login-screen').style.display = 'flex';
};

// ── Auth ──────────────────────────────────────────────
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const r = await apiFetch('/api/auth/login', 'POST', { email, password });
    token = r.token;
    localStorage.setItem('poshakh_owner_token', token);
    showApp(r.email);
  } catch {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
});

function logout() {
  token = '';
  localStorage.removeItem('poshakh_owner_token');
  location.reload();
}

function showApp(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('owner-email-display').textContent = email;
  loadStats();
  loadOrders();
}

// ── Tabs ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['orders','products'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'products') loadProducts();
}

// ── Stats ─────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await apiFetch('/api/orders/stats');
    document.getElementById('stat-today-orders').textContent = s.today_orders;
    document.getElementById('stat-today-revenue').textContent = s.today_revenue_formatted;
    document.getElementById('stat-pending').textContent = s.pending_shipment;
    document.getElementById('stat-total').textContent = s.total_orders;
  } catch {}
}

// ── Orders ────────────────────────────────────────────
async function loadOrders() {
  try {
    const data = await apiFetch('/api/orders');
    allOrders = data.orders || [];
    renderOrders();
  } catch {
    document.getElementById('orders-list').innerHTML = '<div class="empty-state">Failed to load orders.</div>';
  }
}

function filterOrders(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  let orders = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  if (!orders.length) { list.innerHTML = '<div class="empty-state">No orders found.</div>'; return; }
  list.innerHTML = orders.map(orderCard).join('');
}

function orderCard(o) {
  const statusClass = 'status-' + o.status;
  const statusLabel = {paid:'Ready to Ship',shipped:'Shipped',pending_verification:'UPI — Verify Payment'}[o.status] || o.status;
  const itemsHtml = o.items.map(it => `
    <div class="item-row">
      ${it.image ? `<img class="item-img" src="${esc(it.image)}" alt="${esc(it.name)}" onerror="this.style.display='none'"/>` : `<div class="item-img-placeholder">🛍️</div>`}
      <div class="item-info">
        <div class="item-name">${esc(it.name)}</div>
        <div class="item-meta">${it.size ? `Size: ${esc(it.size)} · ` : ''}Qty: ${it.quantity} · ₹${Number(it.price).toLocaleString('en-IN')}</div>
      </div>
    </div>`).join('');
  const payRef = o.payment_method === 'upi' ? `UTR: ${esc(o.utr||'—')}` : `Ref: ${esc(o.razorpay_payment_id||'—')}`;
  const footerBtn = o.status === 'shipped'
    ? `<span class="shipped-label">✅ Shipped on ${o.shipped_at_ist || '—'}</span>`
    : `<button class="btn-ship" onclick="markShipped('${o.id}',this)">${o.status==='pending_verification'?'VERIFY & SHIP':'MARK AS SHIPPED'}</button>`;
  return `<div class="order-card" id="order-${o.id}">
    <div class="order-header">
      <div>
        <div class="order-id">${esc(o.id)}</div>
        <div class="order-date">${o.created_at_ist || o.created_at_utc} · ${o.payment_method?.toUpperCase()||'—'} · ${payRef}</div>
      </div>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    <div class="order-body">
      <div class="order-section"><h4>Customer</h4>
        <p><strong>${esc(o.customer_name)}</strong><br/>${esc(o.customer_phone)}</p>
      </div>
      <div class="order-section"><h4>Ship To</h4>
        <p>${esc(o.address.full)}</p>
      </div>
      <div class="order-section"><h4>Items</h4>
        <div class="items-list">${itemsHtml}</div>
      </div>
    </div>
    <div class="order-footer">
      <div class="order-total">${o.total_formatted} <span style="font-size:12px;color:#888;font-weight:400">(Shipping: ${o.shipping_cost_formatted})</span></div>
      ${footerBtn}
    </div>
  </div>`;
}

async function markShipped(id, btn) {
  btn.disabled = true; btn.textContent = 'MARKING...';
  try {
    const data = await apiFetch(`/api/orders/${id}/ship`, 'PATCH');
    const card = document.getElementById('order-' + id);
    const updated = data.order;
    card.outerHTML = orderCard(updated);
    loadStats();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'MARK AS SHIPPED';
    alert('Failed to mark as shipped. Please try again.');
  }
}

// ── Products ──────────────────────────────────────────
async function loadProducts() {
  try {
    const data = await apiFetch('/api/products');
    renderProducts(data.products || []);
  } catch {
    document.getElementById('products-grid').innerHTML = '<div class="empty-state">Failed to load products.</div>';
  }
}

function renderProducts(products) {
  const el = document.getElementById('products-grid');
  if (!products.length) { el.innerHTML = '<div class="empty-state">No products yet. Add one above!</div>'; return; }
  el.innerHTML = `<div class="products-grid">${products.map(p => `
    <div class="product-tile">
      <img src="${esc(p.image_url||'')}" alt="${esc(p.name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22200%22><rect fill=%22%23f0ece6%22 width=%22100%25%22 height=%22100%25%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23888%22 dy=%22.3em%22 font-size=%2240%22>🛍️</text></svg>'"/>
      <div class="tile-body">
        <div class="tile-name">${esc(p.name)}</div>
        <div class="tile-meta">${esc(p.category)}${p.collection ? ' · ' + esc(p.collection) : ''}</div>
        <div class="tile-price">${esc(p.formattedPrice)}</div>
        <button class="btn-delete" onclick="deleteProduct(${p.id},'${esc(p.name)}')">DELETE</button>
      </div>
    </div>`).join('')}</div>`;
}

function toggleStock(cb) {
  const row = cb.closest('.size-row');
  const stockInput = document.getElementById('stock-' + cb.value);
  if (cb.checked) {
    stockInput.style.display = 'inline-block';
    row.style.borderColor = 'var(--maroon)';
    row.style.background = 'var(--cream-warm)';
  } else {
    stockInput.style.display = 'none';
    stockInput.value = '0';
    row.style.borderColor = 'var(--border-subtle)';
    row.style.background = '#f7f4f0';
  }
}

async function saveProduct() {
  const name = document.getElementById('p-name').value.trim();
  const price = document.getElementById('p-price').value.trim();
  const category = document.getElementById('p-category').value;
  const collection = document.getElementById('p-collection').value.trim();
  const description = document.getElementById('p-description').value.trim();
  const imageFile = document.getElementById('product-image').files[0];

  if (!name || !price || !category) { alert('Name, price and category are required.'); return; }

  // Validate at least one size selected
  const checkedSizes = [...document.querySelectorAll('input[name="sizes[]"]:checked')];
  const sizesError = document.getElementById('sizes-error');
  if (checkedSizes.length === 0) {
    sizesError.style.display = 'block';
    return;
  }
  sizesError.style.display = 'none';

  const fd = new FormData();
  fd.append('name', name);
  fd.append('price', price);
  fd.append('category', category);
  if (collection) fd.append('collection', collection);
  if (description) fd.append('description', description);
  if (imageFile) fd.append('image', imageFile);

  checkedSizes.forEach(cb => {
    fd.append('sizes[]', cb.value);
    const stock = document.getElementById('stock-' + cb.value).value || '0';
    fd.append('stock[]', stock);
  });

  try {
    const r = await fetch(API + '/api/products', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    alert('✅ Product saved!');
    document.getElementById('p-name').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-category').value = '';
    document.getElementById('p-collection').value = '';
    document.getElementById('p-description').value = '';
    document.getElementById('product-image').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('drop-text').style.display = 'block';
    // Reset size checkboxes
    document.querySelectorAll('input[name="sizes[]"]').forEach(cb => {
      cb.checked = false;
      toggleStock(cb);
    });
    loadProducts();
    loadStats();
  } catch(e) { alert('Failed to save product: ' + e.message); }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await apiFetch('/api/products/' + id, 'DELETE');
    loadProducts();
  } catch { alert('Failed to delete product.'); }
}

// ── Image preview ─────────────────────────────────────
function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('img-preview').src = e.target.result;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('drop-text').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const dt = new DataTransfer();
  dt.items.add(file);
  const input = document.getElementById('product-image');
  input.files = dt.files;
  previewImage(input);
}

// ── API helper ────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { Authorization: 'Bearer ' + token } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.status);
  return data;
}
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
